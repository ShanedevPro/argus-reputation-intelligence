services:
  argus-backend:
    build: .
    container_name: argus-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "5000:5000"

  db:
    image: postgres:15
    container_name: argus-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-argus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-argus}
      POSTGRES_DB: ${POSTGRES_DB:-argus}
    ports:
      - "${POSTGRES_PORT:-5444}:5432"
    volumes:
      - argus_postgres_data:/var/lib/postgresql/data

volumes:
  argus_postgres_data:
