name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-focused:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          python -m pip install -U pip
          python -m pip install -r requirements.txt
      - name: Run focused backend tests
        run: |
          PYTHONPATH="$PWD/ReportEngine/utils:${PYTHONPATH:-}" TMPDIR=/tmp TMP=/tmp TEMP=/tmp python -m pytest -q tests/test_argus_html_renderer.py tests/test_report_engine_artifacts.py

  frontend-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/argus-saas
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: apps/argus-saas/pnpm-lock.yaml
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: TMPDIR=/tmp TMP=/tmp TEMP=/tmp pnpm exec tsc --noEmit
